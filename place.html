<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover a beautiful and apppealing destination filled with unforgettable experiences and relaxing surroundings.">
    <meta name="author" content="Asare jeffrey">
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>place of Appealing United States of America</title>
</head>
<body>
    <header>
        <h1>United States of America</h1>
    </header>

    <main>
        <div class="main-container">
            <div class="hero-image">
                <picture>
                    <source media="(min-width:1000px)" srcset="images/hero-large.webp">
                    <source media="(min-width:500px)" srcset="images/hero-medium.webp">
                    <img src="images/hero-small.webp" alt="usa">
                </picture>
            </div>
            <section class="first-section">
                <h2>Data</h2>
                <div class="data-list">
                    <div class="names">
                        <div class="cols">Area:</div>
                        <div class="cols">Position:</div>
                        <div class="cols">Capital:</div>
                        <div class="cols">Language</div>
                        <div class="cols">Currency:</div>
                        <div class="cols">Time Zone:</div>
                        <div class="cols">Calling code:</div>
                        <div class="cols">Internet TLD:</div>
                    </div>
                    <div class="values">
                        <div class="cols">9,525,067 sq km</div>
                        <div class="cols">334 million</div>
                        <div class="cols">Washington D.C</div>
                        <div class="cols">English</div>
                        <div class="cols">United States Dollar (USD)</div>
                        <div class="cols">Eastern UTC - 5 / -4 DST</div>
                        <div class="cols">+1</div>
                        <div class="cols">.us</div>
                    </div>
                </div>
            </section>


            <section class="second-section">
                <h2>Weather <img src="images/cloud-haze2.svg" alt=""></h2>
                <img src="images/cloud-haze2.svg" alt="">

                <div class="data-list">
                    <div class="names">
                    <div class="cols">Temperature:</div>
                    <div class="cols">Condition:</div>
                    <div class="cols">Wind:</div>
                    <div class="cols">Wind Chill:</div>
                    </div>

                    <div class="values">
                        <div class="temperature"> 40 </div>
                        <div class="Condition">Partly cloudy</div>
                        <div class="Wind_speed"> 10 </div>
                        <div class="Wind_chill"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p id="year"><span>&copy;</span></p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
